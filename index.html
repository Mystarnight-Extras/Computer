function wireWindow(w){w.onmousedown=()=>focusWin(w);w.querySelector('.close').onclick=()=>{delete state.windows[w.dataset.id];w.remove();renderTasks()};w.querySelector('.min').onclick=()=>{w.classList.add('minimized');renderTasks()};w.querySelector('.maxbtn').onclick=()=>w.classList.toggle('max');let head=w.querySelector('.win-head'),res=w.querySelector('.resize');let drag=false,dx=0,dy=0;head.onmousedown=e=>{if(e.target.tagName==='BUTTON')return;drag=true;dx=e.clientX-w.offsetLeft;dy=e.clientY-w.offsetTop};document.addEventListener('mousemove',e=>{if(drag&&!w.classList.contains('max')){w.style.left=Math.max(0,e.clientX-dx)+'px';w.style.top=Math.max(0,e.clientY-dy)+'px'}});document.addEventListener('mouseup',()=>drag=false);let rr=false,rw=0,rh=0,rx=0,ry=0;res.onmousedown=e=>{rr=true;rw=w.offsetWidth;rh=w.offsetHeight;rx=e.clientX;ry=e.clientY;e.stopPropagation()};document.addEventListener('mousemove',e=>{if(rr){w.style.width=Math.max(320,rw+e.clientX-rx)+'px';w.style.height=Math.max(240,rh+e.clientY-ry)+'px'}});document.addEventListener('mouseup',()=>rr=false)}
function focusWin(w){w.style.zIndex=++state.z;renderTasks(w.dataset.id)}
function renderTasks(active){let ti=$('#taskItems');ti.innerHTML='';Object.entries(state.windows).forEach(([id,w])=>{let a=getApp(id),b=document.createElement('div');b.className='task-item '+(active===id?'active':'');b.innerHTML=`<span>${a.icon}</span><span>${a.name}</span>`;b.onclick=()=>{w.classList.toggle('minimized',!w.classList.contains('minimized')&&w.style.zIndex==state.z);focusWin(w)};ti.append(b)})}

function wireApp(app,w){let body=w.querySelector('.win-body');if(app.type==='install')body.querySelectorAll('[data-install]').forEach(b=>b.onclick=()=>{let id=b.dataset.install;if(state.installed.has(id)&&id!=='store'){state.installed.delete(id);b.textContent='Install'}else{state.installed.add(id);b.textContent=id==='store'?'Installed':'Remove'}renderDesktop()});if(app.type==='security')wireSecurity(body);if(app.type==='virus')$('#runVirus',body)?.addEventListener('click',()=>runVirus(app.id));if(app.type==='files')wireFiles(body);if(app.type==='notepad'){$('#noteSave',body).onclick=()=>{state.notes=$('#noteArea',body).value;persist();$('#noteStatus',body).textContent='Saved at '+new Date().toLocaleTimeString()};$('#noteClear',body).onclick=()=>{$('#noteArea',body).value=''}}if(app.type==='calc')wireCalc(body);if(app.type==='paint')wirePaint(body);if(app.type==='terminal')wireTerminal(body);if(app.type==='browser')wireBrowser(body);if(app.type==='media')wireMedia(body);if(app.type==='settings')wireSettings(body);if(app.type==='todo')wireTodo(body);if(app.type==='trash')wireTrash(body);if(app.type==='tictactoe')wireTTT(body);if(app.type==='snake')wireSnake(body);if(app.type==='rps')body.querySelectorAll('.rps').forEach(b=>b.onclick=()=>{let c=['Rock','Paper','Scissors'][Math.floor(Math.random()*3)];$('#rpsOut',body).textContent=`You chose ${b.textContent}. Computer chose ${c}. ${b.textContent===c?'Tie':(b.textContent==='Rock'&&c==='Scissors')||(b.textContent==='Paper'&&c==='Rock')||(b.textContent==='Scissors'&&c==='Paper')?'You win!':'Computer wins.'}`});if(app.type==='clicker')wireClicker(body);if(app.type==='memory')wireMemory(body);if(app.type==='guess')wireGuess(body);if(app.type==='simon')wireSimon(body);if(app.type==='mines')wireMines(body);if(app.type==='pong')wirePong(body);if(app.type==='typing')wireTyping(body);body.querySelectorAll('.mockAction').forEach((b,i)=>b.onclick=()=>$('#mockOut',body).textContent='Opened '+b.dataset.record+' at '+new Date().toLoca function wireSecurity(body){let log=$('#scanLog',body),bar=$('#scanBar',body),status=$('#secStatus',body),count=$('#threatCount',body);function refresh(){count.textContent=state.threats.length;status.textContent=state.threats.length?'Action needed':'Protected'}refresh();$('#fixVirus',body).onclick=()=>{clearVirus();refresh();log.textContent+='Repair completed: quarantine cleaned, files unlocked, miner stopped.\n'};$('#scanBtn',body).onclick=()=>{let p=0;log.textContent+='Starting full device scan...\n';let sectors=['boot records','desktop apps','downloads','documents','browser cache','startup tasks','memory','trash','settings','network profiles'];let iv=setInterval(()=>{bar.style.width=p*10+'%';log.textContent+=`Scanned ${sectors[p]||'final checks'}: ${state.threats.length?'suspicious indicators present':'clean'}\n`;log.scrollTop=log.scrollHeight;p++;if(p>10){clearInterval(iv);bar.style.width='100%';if(state.threats.length){log.textContent+='Threats found: '+state.threats.join(', ')+' - quarantined and cleared.\n';clearVirus()}else log.textContent+='No threats found. Device healthy.\n';refresh()}},220)}}

rowserCodec'||kind==='browserDriver'){let copy={browserCoupon:['🧾 CouponHelper','A coupon extension tried to inject ad panels into the browser.'],browserCodec:['🎞️ CodecPack Toolbar','A video codec attempted to change search and toolbar settings.'],browserDriver:['🛠️ DriverUpdater','A driver updater displayed scary system warnings to sell repairs.']}[kind];for(let i=0;i<3;i++){let p=document.createElement('div');p.className='popup';p.style.left=120+i*70+'px';p.style.top=110+i*55+'px';p.innerHTML=`<b>${copy[0]}</b><p>${copy[1]}</p><button class="btn danger">Close Notice</button>`;p.querySelector('button').onclick=()=>p.remove();$('#desktop').append(p)}}else{for(let i=0;i<6;i++){let p=document.createElement('div');p.className='popup';p.style.left=80+i*55+'px';p.style.top=90+i*45+'px';p.innerHTML=`<b>⚠️ Funny System Warning</b><p>Your pixels are being reorganized for comedy.</p><button class="btn danger">Close</button>`;p.querySelector('button').onclick=()=>p.remove();$('#desktop').append(p)}}}

function browserDownload(kind,body){let names={extension:'CouponHelper.extension',codec:'VideoCodecPack.exe',driver:'DriverUpdaterSetup.exe',safe:'Mystarsnight-Manual.pdf'},threat={extension:'BrowserCoupon.AdwareDemo',codec:'CodecPack.ToolbarDemo',driver:'DriverUpdater.ScarewareDemo'};let name=names[kind]||names.safe;if(threat[kind]){state.downloads.push({name,status:'Blocked by Browser Guard - suspicious'});if(!state.threats.includes(threat[kind]))state.threats.push(threat[kind]);persist();runVirus(kind==='extension'?'browserCoupon':kind==='codec'?'browserCodec':'browserDriver')}else{state.downloads.push({name,status:'Downloaded safely to Downloads'});state.files['Downloads/'+name]='Downloaded from Mystarsnight Browser';persist()}let shelf=$('#downloadShelf',body);if(shelf)shelf.innerHTML=state.downloads.map(d=>`<div class="card my-2"><b>${esc(d.name)}</b><p class="text-sm text-slate-500">${esc(d.status)}</p></div>`).join('')}

function wireGuess(body){let n=Math.ceil(Math.random()*100),tries=0;$('#guessBtn',body).onclick=()=>{tries++;let g=+$('#guessInput',body).value;$('#guessOut',body).textContent=g===n?`Correct in ${tries} tries! New number chosen.`:g<n?'Higher.':'Lower.';if(g===n){n=Math.ceil(Math.random()*100);tries=0}}}
function wireSimon(body){let colors=['red','blue','green','yellow'],seq=[],pos=0;$('#simonStart',body).onclick=()=>{seq.push(colors[Math.floor(Math.random()*4)]);pos=0;$('#simonOut',body).textContent='Sequence: '+seq.join(' → ')};body.querySelectorAll('.simon').forEach(b=>b.onclick=()=>{if(!seq.length)return;let ok=b.dataset.c===seq[pos++];if(!ok){$('#simonOut',body).textContent='Missed! Start again.';seq=[];pos=0}else if(pos===seq.length){$('#simonOut',body).textContent='Good! Level '+(seq.length+1)+' ready.';pos=0}})}
function wireMines(body){let mines=new Set();while(mines.size<6)mines.add(Math.floor(Math.random()*36));let revealed=new Set(),over=false;function count(i){let x=i%6,y=Math.floor(i/6),n=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){let j=(y+dy)*6+x+dx;if(dx||dy)if(x+dx>=0&&x+dx<6&&y+dy>=0&&y+dy<6&&mines.has(j))n++}return n}function draw(){let b=$('#mineBoard',body);b.innerHTML=Array.from({length:36},(_,i)=>`<button class="btn secondary" data-i="${i}" style="width:40px;height:40px;padding:0">${revealed.has(i)?(mines.has(i)?'💣':count(i)||''):''}</button>`).join('');$('#mineOut',body).textContent=over?'Boom! Reset to play again.':revealed.size===30?'You cleared the field!':'Avoid 6 mines.';b.querySelectorAll('button').forEach(x=>x.onclick=()=>{let i=+x.dataset.i;if(over)return;revealed.add(i);if(mines.has(i))over=true;draw()})}$('#mineReset',body).onclick=()=>{mines=new Set();while(mines.size<6)mines.add(Math.floor(Math.random()*36));revealed=new Set();over=false;draw()};draw()}
function wirePong(body){let c=$('#pongCanvas',body),ctx=c.getContext('2d'),x=260,y=140,vx=3,vy=2,py=105,iv=null;c.onmousemove=e=>{py=e.clientY-c.getBoundingClientRect().top-35};function frame(){x+=vx;y+=vy;if(y<5||y>275)vy*=-1;if(x<20&&y>py&&y<py+70)vx=Math.abs(vx);if(x>515)vx=-Math.abs(vx);if(x<0){x=260;y=140}ctx.clearRect(0,0,520,280);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,520,280);ctx.fillStyle='#fff';ctx.fillRect(10,py,8,70);ctx.fillRect(500,y-35,8,70);ctx.beginPath();ctx.arc(x,y,7,0,7);ctx.fill()}$('#pongStart',body).onclick=()=>{if(!iv)iv=setInterval(frame,16)}}
function wireTyping(body){let start=0;$('#typeInput',body).oninput=e=>{if(!start)start=Date.now();let target=$('#typePrompt',body).textContent;if(e.target.value===target){let secs=(Date.now()-start)/1000,wpm=Math.round(target.split(' ').length/secs*60);$('#typeOut',body).textContent=`Complete: ${wpm} WPM`;start=0;e.target.value=''}}}

function setVolume(v){state.volume=v;$('#volumeSlider').value=v;$('#volumeRead').textContent=v+'%';persist()}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
$('#startBtn').onclick=()=>$('#startMenu').classList.toggle('hidden');$('#volumeBtn').onclick=()=>$('#volumePop').classList.toggle('hidden');$('#volumeSlider').oninput=e=>setVolume(+e.target.value);setVolume(state.volume);setInterval(()=>{let d=new Date();$('#time').textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});$('#date').textContent=d.toLocaleDateString([], {month:'short',day:'numeric'})},1000);applyTheme();renderDesktop();boot();
</script>
</body>
</html>
