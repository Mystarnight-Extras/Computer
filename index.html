function boot(){let msgs=['Starting services...','Loading desktop shell...','Preparing applications...','Welcome'];let i=0;let t=setInterval(()=>{$('#bootText').textContent=msgs[++i]||'Welcome';if(i>=msgs.length-1){clearInterval(t);setTimeout(()=>{$('#boot').style.opacity=0;setTimeout(()=>$('#boot').remove(),850)},650)}},750)}

function iconEl(app,klass){let el=document.createElement('div');el.className=klass;el.ondblclick=()=>openApp(app.id);el.onclick=e=>{if(klass!=='icon')openApp(app.id)};el.innerHTML=`<div class="icon-badge" style="--c1:${app.colors[0]};--c2:${app.colors[1]}">${app.icon}</div><span>${app.name}</span>`;return el}

function storeHTML(){return `<h2 class="text-2xl font-bold mb-2">App Store</h2><p class="mb-4">Install any of the 100 curated apps. Installed apps appear on the desktop and Start Menu.</p><div class="grid-cards">${apps.map(a=>`<div class="card"><div class="text-3xl">${a.icon}</div><b>${a.name}</b><p class="text-sm text-slate-500">Verified Mystarsnight package</p><button data-install="${a.id}" class="btn mt-2">${state.installed.has(a.id)?'Installed':'Install'}</button></div>`).join('')}</div>`}
function securityHTML(){return `<h2 class="text-2xl font-bold">Antivirus Security Center</h2><div class="card my-3"><b>Status:</b> <span id="secStatus" class="text-green-600">Protected</span><div class="progress my-3"><div id="scanBar" class="bar"></div></div><button id="scanBtn" class="btn">Scan System</button><button id="fixVirus" class="btn secondary">Clear Prank Effects</button></div><pre id="scanLog" class="terminal" style="height:230px">Security log ready.\n</pre>`}
function virusHTML(){return `<div class="text-center p-6"><div class="text-6xl">🎁</div><h2 class="text-2xl font-bold">Free Speed Booster</h2><p>This totally legitimate utility promises impossible performance gains.</p><button id="runVirus" class="btn danger mt-4">Boost My Computer</button><p class="text-xs text-slate-500 mt-3">Safe mock prank. Use Security Center to clear effects.</p></div>`}
function filesHTML(){return `<div class="toolbar"><button id="newFile" class="btn">New File</button><button id="saveFile" class="btn secondary">Save</button><input id="fileName" class="field" placeholder="path/name.txt"></div><div class="grid grid-cols-3 gap-3"><div class="card col-span-1"><b>Files</b><div id="fileList" class="mt-2"></div></div><textarea id="fileText" class="field col-span-2" style="height:360px"></textarea></div>`}
function notepadHTML(){return `<div class="toolbar"><button id="noteSave" class="btn">Save</button><button id="noteClear" class="btn secondary">Clear</button><span id="noteStatus" class="text-sm text-slate-500">Local autosave enabled</span></div><textarea id="noteArea" class="field w-full" style="height:390px" placeholder="Type notes here...">${esc(state.notes)}</textarea>`}
function calcHTML(){return `<input id="calcDisplay" class="field w-full text-right text-2xl mb-3" readonly><div class="grid grid-cols-4 gap-2">${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+','C','(',')','⌫'].map(x=>`<button class="btn secondary calcKey">${x}</button>`).join('')}</div>`}
function paintHTML(){return `<div class="toolbar"><input id="paintColor" type="color" value="#2563eb"><input id="paintSize" type="range" min="1" max="24" value="5"><button id="paintClear" class="btn secondary">Clear</button></div><canvas id="paintCanvas" class="paint-canvas" width="680" height="360"></canvas>`}

function browserHTML(){return `<div class="toolbar"><input id="url" class="field flex-1" value="https://example.com"><button id="go" class="btn">Go</button></div><div id="webpage" class="card"><h2 class="text-2xl font-bold">Mystarsnight Search</h2><input id="searchWeb" class="field w-full my-3" placeholder="Search the web"><div id="results"></div></div>`}
function mediaHTML(){return `<h2 class="text-2xl font-bold">Media Player</h2><div class="card text-center"><div class="text-7xl my-6">🎧</div><b id="track">Corporate Focus Loop</b><input type="range" class="w-full my-4"><div><button id="prev" class="btn secondary">⏮</button> <button id="play" class="btn">▶ Play</button> <button id="next" class="btn secondary">⏭</button></div></div>`}
function settingsHTML(){return `<h2 class="text-2xl font-bold">System Settings</h2><div class="grid-cards mt-3"><div class="card"><b>Wallpaper</b><select id="themeSel" class="field w-full mt-2"><option>blue</option><option>green</option><option>violet</option><option>slate</option><option>light</option></select></div><div class="card"><b>Volume</b><input id="setVolume" type="range" min="0" max="100" value="${state.volume}" class="w-full mt-3"></div><div class="card"><b>Desktop</b><button id="resetInstall" class="btn secondary mt-2">Reset Installed Apps</button></div></div>`}

function snakeHTML(){return `<h2 class="text-xl font-bold">Snake</h2><p>Use arrow keys. Keep this window focused.</p><div id="snakeScore" class="font-bold my-2">Score: 0</div><div id="snakeBoard" class="snake-board"></div><button id="snakeStart" class="btn mt-3">Start</button>`}

function simonHTML(){return `<h2 class="text-xl font-bold">Simon Says</h2><div id="simonBtns" class="grid grid-cols-2 gap-2 w-56 my-3">${['red','blue','green','yellow'].map(c=>`<button class="simon btn" data-c="${c}" style="background:${c}">${c}</button>`).join('')}</div><button id="simonStart" class="btn secondary">Start Round</button><div id="simonOut" class="mt-2">Repeat the sequence.</div>`}
function minesHTML(){return `<h2 class="text-xl font-bold">Mine Sweeper</h2><div id="mineBoard" class="grid grid-cols-6 gap-1 w-max my-3"></div><div id="mineOut"></div><button id="mineReset" class="btn secondary mt-2">Reset</button>`}
function pongHTML(){return `<h2 class="text-xl font-bold">Pong</h2><canvas id="pongCanvas" width="520" height="280" class="paint-canvas"></canvas><div><button id="pongStart" class="btn mt-2">Start</button></div>`}
function typingHTML(){return `<h2 class="text-xl font-bold">Typing Sprint</h2><p id="typePrompt" class="card">professional desktop computer</p><input id="typeInput" class="field w-full mt-2" placeholder="Type the phrase above"><div id="typeOut" class="mt-2">Timer starts when you type.</div>`}
function mockHTML(app){let rows=['Overview','Recent Activity','Smart Insights','Pinned Items','Team Notes'];return `<h2 class="text-2xl font-bold">${app.icon} ${app.name}</h2><p class="text-slate-600 mb-3">A polished working application panel with saved sample data and interactive controls.</p><div class="toolbar"><input class="field flex-1" placeholder="Search ${app.name}"><button class="btn">New</button><button class="btn secondary">Sync</button></div><div class="grid-cards">${rows.map((r,i)=>`<div class="card"><b>${r}</b><p class="text-sm text-slate-500 mt-2">${app.name} item ${i+1}: ${['Ready','Updated','Scheduled','Reviewed','Archived'][i]}.</p><button class="btn secondary mt-3 mockAction">Open</button></div>`).join('')}</div><div class="card mt-3"><b>Live Preview</b><p id="mockOut">Select an action to update this panel.</p></div>`}
function wireApp(app,w){let body=w.querySelector('.win-body');if(app.type==='install')body.querySelectorAll('[data-install]').forEach(b=>b.onclick=()=>{state.installed.add(b.dataset.install);b.textContent='Installed';renderDesktop()});if(app.type==='security')wireSecurity(body);if(app.type==='virus')$('#runVirus',body)?.addEventListener('click',runVirus);if(app.type==='files')wireFiles(body);if(app.type==='notepad'){$('#noteSave',body).onclick=()=>{state.notes=$('#noteArea',body).value;persist();$('#noteStatus',body).textContent='Saved at '+new Date().toLocaleTimeString()};$('#noteClear',body).onclick=()=>{$('#noteArea',body).value=''}}if(app.type==='calc')wireCalc(body);if(app.type==='paint')wirePaint(body);if(app.type==='terminal')wireTerminal(body);if(app.type==='browser')wireBrowser(body);if(app.type==='media')wireMedia(body);if(app.type==='settings')wireSettings(body);if(app.type==='todo')wireTodo(body);if(app.type==='tictactoe')wireTTT(body);if(app.type==='snake')wireSnake(body);if(app.type==='rps')body.querySelectorAll('.rps').forEach(b=>b.onclick=()=>{let c=['Rock','Paper','Scissors'][Math.floor(Math.random()*3)];$('#rpsOut',body).textContent=`You chose ${b.textContent}. Computer chose ${c}. ${b.textContent===c?'Tie':(b.textContent==='Rock'&&c==='Scissors')||(b.textContent==='Paper'&&c==='Rock')||(b.textContent==='Scissors'&&c==='Paper')?'You win!':'Computer wins.'}`});if(app.type==='clicker')wireClicker(body);if(app.type==='memory')wireMemory(body);if(app.type==='guess')wireGuess(body);if(app.type==='simon')wireSimon(body);if(app.type==='mines')wireMines(body);if(app.type==='pong')wirePong(body);if(app.type==='typing')wireTyping(body);body.querySelectorAll('.mockAction').forEach((b,i)=>b.onclick=()=>$('#mockOut',body).textContent='Opened detailed record '+(i+1)+' at '+new Date().toLocaleTimeString())}
function wireSecurity(body){let log=$('#scanLog',body),bar=$('#scanBar',body),status=$('#secStatus',body);$('#fixVirus',body).onclick=clearVirus;$('#scanBtn',body).onclick=()=>{let p=0;log.textContent+='Starting full scan...\n';let iv=setInterval(()=>{p+=10;bar.style.width=p+'%';log.textContent+=`Scanned sector ${p/10}: clean\n`;log.scrollTop=log.scrollHeight;if(p>=100){clearInterval(iv);if(state.virus){log.textContent+='Threat found: Prank.SpeedBooster.Mock - cleared.\n';status.textContent='Threats cleared';clearVirus()}else log.textContent+='No threats found. System healthy.\n'}},250)}}
function runVirus(){state.virus=true;let m=$('#matrix');m.classList.remove('hidden');m.innerHTML='';for(let i=0;i<120;i++){let s=document.createElement('div');s.style.position='absolute';s.style.left=Math.random()*100+'%';s.style.top=-Math.random()*100+'%';s.style.animation=`fall ${3+Math.random()*4}s linear infinite`;s.textContent='010101 SYSTEM HACKED LOL ';m.append(s)}if(!$('#fallStyle')){let st=document.createElement('style');st.id='fallStyle';st.textContent='@keyframes fall{to{transform:translateY(130vh)}}';document.head.append(st)}for(let i=0;i<6;i++){let p=document.createElement('div');p.className='popup';p.style.left=80+i*55+'px';p.style.top=90+i*45+'px';p.innerHTML=`<b>⚠️ Funny System Warning</b><p>Your pixels are being reorganized for comedy.</p><button class="btn danger">Close</button>`;p.querySelector('button').onclick=()=>p.remove();$('#desktop').append(p)}}
function clearVirus(){state.virus=false;$('#matrix').classList.add('hidden');$$('.popup').forEach(p=>p.remove())}
function wireFiles(body){let list=$('#fileList',body),name=$('#fileName',body),txt=$('#fileText',body);function draw(){list.innerHTML=Object.keys(state.files).map(f=>`<div class="p-2 rounded hover:bg-slate-100 cursor-pointer" data-file="${f}">📄 ${f}</div>`).join('');list.querySelectorAll('[data-file]').forEach(x=>x.onclick=()=>{name.value=x.dataset.file;txt.value=state.files[x.dataset.file]})}draw();$('#newFile',body).onclick=()=>{name.value='Documents/new-file.txt';txt.value=''};$('#saveFile',body).onclick=()=>{state.files[name.value||'Untitled.txt']=txt.value;persist();draw()}}
function wireCalc(body){let d=$('#calcDisplay',body);body.querySelectorAll('.calcKey').forEach(k=>k.onclick=()=>{let v=k.textContent;if(v==='C')d.value='';else if(v==='⌫')d.value=d.value.slice(0,-1);else if(v==='='){try{d.value=Function('return '+d.value.replace(/[^0-9+\-*/().]/g,''))()}catch{d.value='Error'}}else d.value+=v})}
function wirePaint(body){let c=$('#paintCanvas',body),ctx=c.getContext('2d'),draw=false;ctx.lineCap='round';function pos(e){let r=c.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}c.onmousedown=e=>{draw=true;let p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};c.onmousemove=e=>{if(!draw)return;let p=pos(e);ctx.strokeStyle=$('#paintColor',body).value;ctx.lineWidth=$('#paintSize',body).value;ctx.lineTo(p.x,p.y);ctx.stroke()};document.addEventListener('mouseup',()=>draw=false);$('#paintClear',body).onclick=()=>ctx.clearRect(0,0,c.width,c.height)}
function wireTerminal(body){let out=$('#term',body),inp=$('#termInput',body);inp.onkeydown=e=>{if(e.key!=='Enter')return;let cmd=inp.value.trim();inp.value='';let res='';if(cmd==='help')res='help, dir, cls, echo, date, apps, scan';else if(cmd==='dir')res=Object.keys(state.files).join('\n');else if(cmd==='cls'){out.textContent='';return}else if(cmd.startsWith('echo '))res=cmd.slice(5);else if(cmd==='date')res=new Date().toString();else if(cmd==='apps')res=apps.map(a=>a.name).join(', ');else if(cmd==='scan')res='Use Security Center for full scan.';else res='Unknown command';out.textContent+=cmd+'\n'+res+'\n> ';out.scrollTop=out.scrollHeight}}
function wireBrowser(body){let res=$('#results',body);$('#go',body).onclick=()=>{$('#webpage',body).innerHTML=`<h2 class="text-xl font-bold">Loaded ${esc($('#url',body).value)}</h2><p>This desktop safely previews page loading without leaving the workspace.</p>`};$('#searchWeb',body).oninput=e=>{let q=e.target.value;res.innerHTML=q?['Official docs','News result','Community forum','Image result'].map(x=>`<div class="card my-2"><b>${x} for ${esc(q)}</b><p class="text-sm text-slate-500">Desktop search result generated locally.</p></div>`).join(''):''}}
function wireMedia(body){let tracks=['Corporate Focus Loop','Soft Piano Demo','Podcast Preview'];let i=0,playing=false;function draw(){$('#track',body).textContent=tracks[i];$('#play',body).textContent=playing?'⏸ Pause':'▶ Play'}$('#play',body).onclick=()=>{playing=!playing;draw()};$('#next',body).onclick=()=>{i=(i+1)%tracks.length;draw()};$('#prev',body).onclick=()=>{i=(i+tracks.length-1)%tracks.length;draw()}}
function wireSettings(body){$('#themeSel',body).value=state.theme;$('#themeSel',body).onchange=e=>{state.theme=e.target.value;applyTheme();persist()};$('#setVolume',body).oninput=e=>setVolume(+e.target.value);$('#resetInstall',body).onclick=()=>{localStorage.removeItem('msc-installed');location.reload()}}
function wireTodo(body){let list=$('#todoList',body);function draw(){list.innerHTML=state.todos.map((t,i)=>`<div class="card my-2"><label><input type="checkbox" data-i="${i}" ${t.done?'checked':''}> ${esc(t.text)}</label><button class="btn secondary float-right" data-del="${i}">Delete</button></div>`).join('');list.querySelectorAll('[data-i]').forEach(x=>x.onchange=()=>{state.todos[x.dataset.i].done=x.checked;persist();draw()});list.querySelectorAll('[data-del]').forEach(x=>x.onclick=()=>{state.todos.splice(x.dataset.del,1);persist();draw()})}draw();$('#addTodo',body).onclick=()=>{let v=$('#todoText',body).value.trim();if(v){state.todos.push({text:v,done:false});$('#todoText',body).value='';persist();draw()}}}
function wireTTT(body){let board=Array(9).fill(''),turn='X';function win(){let l=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return l.find(a=>board[a[0]]&&board[a[0]]===board[a[1]]&&board[a[1]]===board[a[2]])}function draw(){let g=$('#ttt',body);g.innerHTML=board.map((v,i)=>`<div class="game-cell" data-i="${i}">${v}</div>`).join('');let w=win();$('#tttStatus',body).textContent=w?board[w[0]]+' wins!':'Turn: '+turn;g.querySelectorAll('[data-i]').forEach(c=>c.onclick=()=>{if(board[c.dataset.i]||win())return;board[c.dataset.i]=turn;turn=turn==='X'?'O':'X';draw()})}$('#tttReset',body).onclick=()=>{board.fill('');turn='X';draw()};draw()}
function wireSnake(body){let cells=[],snake=[0],food=55,dir=1,iv=null,score=0,board=$('#snakeBoard',body);function draw(){board.innerHTML='';cells=Array.from({length:256},(_,i)=>{let d=document.createElement('div');d.className='snake-cell '+(snake.includes(i)?'snake':i===food?'food':'');board.append(d);return d});$('#snakeScore',body).textContent='Score: '+score}function step(){let h=snake[0]+dir;if(h<0||h>255||snake.includes(h)||(dir===1&&h%16===0)||(dir===-1&&h%16===15)){clearInterval(iv);iv=null;return}snake.unshift(h);if(h===food){score++;food=Math.floor(Math.random()*256)}else snake.pop();draw()}document.onkeydown=e=>{if(e.key==='ArrowUp')dir=-16;if(e.key==='ArrowDown')dir=16;if(e.key==='ArrowLeft')dir=-1;if(e.key==='ArrowRight')dir=1};$('#snakeStart',body).onclick=()=>{if(iv)return;snake=[0];dir=1;score=0;iv=setInterval(step,140);draw()};draw()}
function wireClicker(body){let n=0,p=1;function draw(){$('#clickScore',body).textContent=n;$('#clickUpgrade',body).textContent='Upgrade ('+(p*10)+')'}$('#clickBtn',body).onclick=()=>{n+=p;draw()};$('#clickUpgrade',body).onclick=()=>{if(n>=p*10){n-=p*10;p++;draw()}};draw()}

function wireMemory(body){let icons=['🍎','🍌','🍇','🍒','🍎','🍌','🍇','🍒'].sort(()=>Math.random()-.5),open=[],done=[];function draw(){let b=$('#memoryBoard',body);b.innerHTML=icons.map((v,i)=>`<button class="btn secondary" data-i="${i}" style="width:58px;height:58px;font-size:24px">${open.includes(i)||done.includes(i)?v:'?'}</button>`).join('');$('#memoryStatus',body).textContent=`Matched ${done.length/2}/4 pairs`;b.querySelectorAll('button').forEach(x=>x.onclick=()=>{let i=+x.dataset.i;if(open.length<2&&!open.includes(i)&&!done.includes(i)){open.push(i);if(open.length===2){if(icons[open[0]]===icons[open[1]])done.push(...open);setTimeout(()=>{open=[];draw()},500)}draw()}})}$('#memoryReset',body).onclick=()=>{icons.sort(()=>Math.random()-.5);open=[];done=[];draw()};draw()}
function wireGuess(body){let n=Math.ceil(Math.random()*100),tries=0;$('#guessBtn',body).onclick=()=>{tries++;let g=+$('#guessInput',body).value;$('#guessOut',body).textContent=g===n?`Correct in ${tries} tries! New number chosen.`:g<n?'Higher.':'Lower.';if(g===n){n=Math.ceil(Math.random()*100);tries=0}}}
function wireSimon(body){let colors=['red','blue','green','yellow'],seq=[],pos=0;$('#simonStart',body).onclick=()=>{seq.push(colors[Math.floor(Math.random()*4)]);pos=0;$('#simonOut',body).textContent='Sequence: '+seq.join(' → ')};body.querySelectorAll('.simon').forEach(b=>b.onclick=()=>{if(!seq.length)return;let ok=b.dataset.c===seq[pos++];if(!ok){$('#simonOut',body).textContent='Missed! Start again.';seq=[];pos=0}else if(pos===seq.length){$('#simonOut',body).textContent='Good! Level '+(seq.length+1)+' ready.';pos=0}})}
function wireMines(body){let mines=new Set();while(mines.size<6)mines.add(Math.floor(Math.random()*36));let revealed=new Set(),over=false;function count(i){let x=i%6,y=Math.floor(i/6),n=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){let j=(y+dy)*6+x+dx;if(dx||dy)if(x+dx>=0&&x+dx<6&&y+dy>=0&&y+dy<6&&mines.has(j))n++}return n}function draw(){let b=$('#mineBoard',body);b.innerHTML=Array.from({length:36},(_,i)=>`<button class="btn secondary" data-i="${i}" style="width:40px;height:40px;padding:0">${revealed.has(i)?(mines.has(i)?'💣':count(i)||''):''}</button>`).join('');$('#mineOut',body).textContent=over?'Boom! Reset to play again.':revealed.size===30?'You cleared the field!':'Avoid 6 mines.';b.querySelectorAll('button').forEach(x=>x.onclick=()=>{let i=+x.dataset.i;if(over)return;revealed.add(i);if(mines.has(i))over=true;draw()})}$('#mineReset',body).onclick=()=>{mines=new Set();while(mines.size<6)mines.add(Math.floor(Math.random()*36));revealed=new Set();over=false;draw()};draw()}
function wirePong(body){let c=$('#pongCanvas',body),ctx=c.getContext('2d'),x=260,y=140,vx=3,vy=2,py=105,iv=null;c.onmousemove=e=>{py=e.clientY-c.getBoundingClientRect().top-35};function frame(){x+=vx;y+=vy;if(y<5||y>275)vy*=-1;if(x<20&&y>py&&y<py+70)vx=Math.abs(vx);if(x>515)vx=-Math.abs(vx);if(x<0){x=260;y=140}ctx.clearRect(0,0,520,280);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,520,280);ctx.fillStyle='#fff';ctx.fillRect(10,py,8,70);ctx.fillRect(500,y-35,8,70);ctx.beginPath();ctx.arc(x,y,7,0,7);ctx.fill()}$('#pongStart',body).onclick=()=>{if(!iv)iv=setInterval(frame,16)}}
function wireTyping(body){let start=0;$('#typeInput',body).oninput=e=>{if(!start)start=Date.now();let target=$('#typePrompt',body).textContent;if(e.target.value===target){let secs=(Date.now()-start)/1000,wpm=Math.round(target.split(' ').length/secs*60);$('#typeOut',body).textContent=`Complete: ${wpm} WPM`;start=0;e.target.value=''}}}

function setVolume(v){state.volume=v;$('#volumeSlider').value=v;$('#volumeRead').textContent=v+'%';persist()}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
$('#startBtn').onclick=()=>$('#startMenu').classList.toggle('hidden');$('#volumeBtn').onclick=()=>$('#volumePop').classList.toggle('hidden');$('#volumeSlider').oninput=e=>setVolume(+e.target.value);setVolume(state.volume);setInterval(()=>{let d=new Date();$('#time').textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});$('#date').textContent=d.toLocaleDateString([], {month:'short',day:'numeric'})},1000);applyTheme();renderDesktop();boot();
